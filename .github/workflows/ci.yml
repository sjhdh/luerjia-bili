name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - if: runner.os == 'Linux'
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.5,<3"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check backend deploy
      - if: runner.os == 'Linux'
        run: bash -n deploy/*.sh
      - run: python -m mypy backend/app --no-incremental
      - run: python -m alembic upgrade head
        env:
          DATA_DIR: ${{ runner.temp }}/luerjia-data
          LIGHTWEIGHT_ANALYSIS: "true"
      - run: python -m pytest -q
        env:
          LIGHTWEIGHT_ANALYSIS: "true"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
